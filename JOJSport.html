<!DOCTYPE html>
<html>
<head>
    <title>DEOTTV</title>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'/>
    <!-- Memasukkan CSS Shaka Player UI bawaan dari CDN agar UI ter-render dengan benar -->
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.3/shaka-player.ui.min.css' crossorigin='anonymous'/>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.3/shaka-player.ui.min.js' crossorigin='anonymous'></script>
    <link rel='stylesheet' href='assets/styleshaka.css' crossorigin='anonymous'/>
    <link rel='stylesheet' href='assets/style.css' crossorigin='anonymous'/>
</head>

<body bgcolor='black' style='margin:0' oncontextmenu='return false' onkeydown='return false' onmousedown='return false'>

    <div id="vidio" data-shaka-player-container style='position:absolute;z-index: -1;top: 0;left: 0;width: 100%; height: 100%;'>
        <video autoplay data-shaka-player id='video' poster="img/b.png" style='width:100%;height:100%;object-fit:cover;'></video>
        
        <div class="shaka-controls-container" shown="true">
            <div class="shaka-scrim-container"></div>
            <div class="shaka-play-buton-container">
                <button class="shaka-play-button shaka-no-propagation" aria-label="Pause"></button>
		    </div>
            <div class="shaka-server-side-ad-container"></div>
            <div class="shaka-bottom-controls shaka-no-propagation">
                <div class="shaka-ad-controls shaka-hidden">
                    <div class="shaka-ad-position shaka-hidden">
                        <span class="shaka-ad-position-span"></span>
				    </div>
                    <div class="shaka-ad-counter">
                        <span class="shaka-ad-counter-span"></span>
				    </div>
			    </div>
                <div class="shaka-controls-button-panel shaka-show-controls-on-mouse-over">
                    <img src="" style='width:15%; height:15%;' class="shaka-fullscreen-button material-icons-round shaka-tooltip" aria-label="mute">
			    </div>
		    </div>
	    </div>
    </div>

   <script> 
   async function init() { 
        const video = document.getElementById('video'); 
        const ui = video['ui']; 
        const controls = ui.getControls(); 
        const player = controls.getPlayer(); 
        const sekang = 'https://dash2.antik.sk/stream/nvidia_joj_sport/playlist_cenc.mpd';
                        
        player.configure({
            drm: {
                clearKeys: {
                    '11223344556677889900112233445566': '4b80724d0ef86bcb2c21f7999d67739d'
                }
            }
        });

        window.player = player; 
        window.ui = ui; 
        
        player.addEventListener('error', onPlayerErrorEvent); 
        controls.addEventListener('error', onUIErrorEvent); 
        
        try {
            await player.load(sekang); 
            console.log('The video has now been loaded!');
        } catch (error) {
            onPlayerError(error);
        }
    } 

    // Perbaikan: mengganti 'event.detail' menjadi 'errorEvent.detail'
    function onPlayerErrorEvent(errorEvent) { 
        onPlayerError(errorEvent.detail); 
    } 
    
    function onUIErrorEvent(errorEvent) { 
        onPlayerError(errorEvent.detail); 
    } 

    function onPlayerError(error) { 
        console.error('Error code', error.code, 'object', error); 
    } 
    
    function initFailed(errorEvent) { 
        console.error('Unable to load the UI library!'); 
    } 

    document.addEventListener('shaka-ui-loaded', init); 
    document.addEventListener('shaka-ui-load-failed', initFailed); 
    </script>
    
</body>
</html>
